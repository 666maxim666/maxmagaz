<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MaxMagaz</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e2a3a, #2a3f5a);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0;
            padding: 0 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .highlight {
            color: #f5b042;
            font-size: 3.5rem;
            margin-top: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 0 20px #f5b04288;
        }
        .emoji-big {
            font-size: 4rem;
            display: block;
            margin: 10px 0;
        }
        img {
            max-width: 80%;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(245, 176, 66, 0.3);
            margin: 20px 0;
            border: 2px solid #f5b042;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .highlight { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Стикер (эмодзи) сверху -->
    <span class="emoji-big">🚀✨</span>

    <h1>Привет родители, я научился составлять сайты, самостоятельно</h1>

    <!-- Картинка -->
    <img src="https://iimg.su/i/p0rRjg" alt="Фото">

    <!-- Стикер и фамилия -->
    <span class="emoji-big">⭐️💫</span>
    <div class="highlight">БУЗМАКОВЫ</div>
    <span class="emoji-big">🔥🎉</span>

</body>
</html>
